version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: altairis_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: altairis123
      MYSQL_DATABASE: altairis_db
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-paltairis123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: altairis_backend
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=mysql;Database=altairis_db;User=root;Password=altairis123;
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: altairis_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
